name: Build CI Images

on:
  push:
    branches: [main]
    paths:
      - 'flake.nix'
      - 'flake.lock'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [ci-go, ci-ui]
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Build image
        run: nix build .#${{ matrix.image }} -o result

      - name: Log in to GHCR
        run: echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Load and push image
        run: |
          # Capture output of docker load to find the EXACT image name built by Nix
          LOAD_OUTPUT=$(docker load < result)
          echo "$LOAD_OUTPUT"

          # Extract the image name correctly, avoiding system images like gh-aw-mcpg
          IMAGE_INFO=$(echo "$LOAD_OUTPUT" | grep -oP 'Loaded image: \K.*')
          echo "Identified Nix image: $IMAGE_INFO"

          if [[ -z "$IMAGE_INFO" ]]; then
            echo "Error: Could not identify loaded image"
            exit 1
          fi

          # Push the specific tag built by Nix (contains nixpkgs rev)
          docker push "$IMAGE_INFO"

          # Tag and push as :latest
          IMAGE_NAME=$(echo "$IMAGE_INFO" | cut -d: -f1)
          docker tag "$IMAGE_INFO" "$IMAGE_NAME:latest"
          docker push "$IMAGE_NAME:latest"

          echo "Successfully pushed $IMAGE_INFO and $IMAGE_NAME:latest"
