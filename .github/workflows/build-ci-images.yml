name: Build CI Images

on:
  push:
    branches: [main]
    paths:
      - 'flake.nix'
      - 'flake.lock'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [ci-go, ci-ui]
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Build image
        run: nix build .#${{ matrix.image }} -o result

      - name: Push image
        run: |
          skopeo copy \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            "docker-archive:result" \
            "docker://$(docker load < result | grep -oP 'Loaded image: \K.*')"

          # Also push as :latest
          IMAGE_INFO=$(docker images --format '{{.Repository}}:{{.Tag}}' | head -1)
          IMAGE_NAME=$(echo "$IMAGE_INFO" | cut -d: -f1)
          skopeo copy \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            "docker-archive:result" \
            "docker://${IMAGE_NAME}:latest"

          echo "✅ Pushed $IMAGE_INFO and $IMAGE_NAME:latest"
