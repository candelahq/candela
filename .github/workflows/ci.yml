name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}

      - name: Generate proto (gen/ is gitignored)
        run: |
          cd proto
          buf generate

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v -race -count=1 -coverprofile=coverage.out -timeout 60s

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        continue-on-error: true  # advisory — stdlib vulns shouldn't block CI

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}

      - name: Generate proto
        run: |
          cd proto
          buf generate

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Files not formatted:"
            gofmt -l .
            exit 1
          fi

  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # buf breaking needs main ref

      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}

      - name: buf format check
        run: buf format --diff --exit-code proto/

      - name: buf breaking (PR only)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main
          buf breaking proto/ --against '.git#branch=origin/main,subdir=proto'
