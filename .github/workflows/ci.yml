name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container: ghcr.io/candelahq/ci-go:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install UI deps (protoc-gen-es)
        run: npm ci
        working-directory: ui

      - name: Generate proto (gen/ is gitignored)
        run: |
          cd proto
          buf generate

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v -race -count=1 -coverprofile=coverage.out -timeout 60s

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    container: ghcr.io/candelahq/ci-go:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install UI deps (protoc-gen-es)
        run: npm ci
        working-directory: ui

      - name: Generate proto
        run: |
          cd proto
          buf generate

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Files not formatted:"
            gofmt -l .
            exit 1
          fi

  proto:
    runs-on: ubuntu-latest
    container: ghcr.io/candelahq/ci-go:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: buf format check
        run: buf format --diff --exit-code proto/

      - name: buf breaking (PR only)
        if: github.event_name == 'pull_request'
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch origin main
          buf breaking proto/ --against '.git#branch=origin/main,subdir=proto'

  ui-build-and-lint:
    runs-on: ubuntu-latest
    container: ghcr.io/candelahq/ci-ui:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci
        working-directory: ui

      - name: Generate TS proto stubs
        run: |
          cd proto
          buf generate

      - name: Copy generated types
        run: cp -r gen/ts/candela ui/src/gen

      - name: Lint
        run: npx eslint .
        working-directory: ui

      - name: Build (includes TypeScript type-check)
        run: npx next build
        working-directory: ui

  ui-e2e:
    runs-on: ubuntu-latest
    container: ghcr.io/candelahq/ci-ui:latest
    needs: [ui-build-and-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci
        working-directory: ui

      - name: Generate TS proto stubs
        run: |
          cd proto
          buf generate

      - name: Copy generated types
        run: cp -r gen/ts/candela ui/src/gen

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: ui
        env:
          CI: true

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui/playwright-report/
          retention-days: 7
