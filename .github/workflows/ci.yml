name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/candelahq/candela-ci-run-go:latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate proto
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
        run: |
          cd proto
          if [[ -z "$BUF_TOKEN" ]]; then
            echo "::warning title=Missing BUF_TOKEN::BUF_TOKEN secret is not set. Remote generation may fail for private dependencies."
          fi
          if ! buf generate; then
             echo "::error title=Proto Generation Failed::Remote generation failed. Check your BUF_TOKEN and buf.gen.yaml configuration."
             exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v -race -count=1 -coverprofile=coverage.out -timeout 60s

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: govulncheck
        run: govulncheck ./...

  lint-and-ui:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/candelahq/candela-ci-run-ui:latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ui/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('ui/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci
        working-directory: ui

      - name: Generate TS proto stubs (Remote)
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
        run: |
          cd proto
          buf generate

      - name: Copy generated types
        run: cp -r gen/ts/candela ui/src/gen

      - name: UI Lint
        run: npx eslint .
        working-directory: ui

      - name: UI Build
        run: npx next build
        working-directory: ui

  ui-e2e:
    runs-on: ubuntu-latest
    needs: [lint-and-ui]
    container:
      image: ghcr.io/candelahq/candela-ci-run-ui:latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ui/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('ui/package-lock.json') }}

      - name: Install dependencies
        run: npm ci
        working-directory: ui

      - name: Generate TS proto stubs (Remote)
        run: |
          cd proto
          buf generate
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}

      - name: Copy generated types
        run: cp -r gen/ts/candela ui/src/gen

      - name: Install Playwright browsers (Hermetic)
        # We use the chromium from our Nix image but still need the playwright-specific setup
        run: npx playwright install --with-deps chromium
        working-directory: ui

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: ui
        env:
          CI: true

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui/playwright-report/
          retention-days: 7
