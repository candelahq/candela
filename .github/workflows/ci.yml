name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate proto (Remote)
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
        run: |
          nix develop -c bash -c "cd proto && buf generate"

      - name: Build
        run: nix develop -c go build ./...

      - name: Vet
        run: nix develop -c go vet ./...

      - name: Test
        run: nix develop -c go test ./... -v -race -count=1 -coverprofile=coverage.out -timeout 60s

      - name: Coverage summary
        run: nix develop -c go tool cover -func=coverage.out | tail -1

      - name: govulncheck
        continue-on-error: true   # Advisory — don't block CI on stdlib CVEs we can't patch immediately
        run: nix develop -c govulncheck ./...

  ui-build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: nix develop -c pnpm install
        working-directory: ui

      - name: Generate TS proto stubs (Remote)
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
        run: |
          nix develop -c bash -c "cd proto && buf generate"

      - name: Copy generated types
        run: |
          cp -r gen/ts/candela/* ui/src/gen/
          rm -f ui/src/gen/types/bq_span_pb.ts

      - name: Lint
        run: nix develop -c pnpm run lint
        working-directory: ui

      - name: Build
        run: nix develop -c pnpm run build
        working-directory: ui

  ui-e2e:
    runs-on: ubuntu-latest
    needs: [ui-build-and-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: nix develop -c pnpm install
        working-directory: ui

      - name: Generate TS proto stubs (Remote)
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
        run: |
          nix develop -c bash -c "cd proto && buf generate"

      - name: Copy generated types
        run: |
          cp -r gen/ts/candela/* ui/src/gen/
          rm -f ui/src/gen/types/bq_span_pb.ts

      - name: Install Playwright browsers (Using Nix)
        run: nix develop -c pnpm exec playwright install --with-deps chromium
        working-directory: ui

      - name: Run Playwright tests
        run: nix develop -c pnpm exec playwright test
        working-directory: ui
        env:
          CI: true

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui/playwright-report/
          retention-days: 7
