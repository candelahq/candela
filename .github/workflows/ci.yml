name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read   # needed to pull ghcr.io/candelahq/candela-dev

# All jobs use the pre-baked Nix dev container — no per-job Nix install,
# no FlakeHub rate limits. Rebuild the image via the dev-container workflow
# whenever flake.nix / flake.lock changes.
env:
  DEV_IMAGE: ghcr.io/candelahq/candela-dev:latest

jobs:
  # ── build, vet, and lint ────────────────────────────────────────────────────
  build-and-lint:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/candelahq/candela-dev:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Lint GitHub Actions workflows
        run: actionlint

      - name: Generate proto stubs (from BSR)
        run: buf generate

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

  # ── tests — parallel matrix by package group ────────────────────────────────
  go-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/candelahq/candela-dev:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      FIRESTORE_EMULATOR_HOST: localhost:8086
    strategy:
      fail-fast: false   # let all groups run so we see all failures at once
      matrix:
        group:
          # Only cmd packages that contain test files.
          - name: cmd
            pkgs: ./cmd/candela-local/... ./cmd/candela-sidecar/...
          # Fast pkg tests — no Firestore dependency.
          - name: pkg-core
            pkgs: ./pkg/auth/... ./pkg/connecthandlers/... ./pkg/costcalc/... ./pkg/notify/... ./pkg/proxy/... ./pkg/runtime/... ./pkg/session/...
          # Storage layer — mix of emulator and pure-Go backends.
          - name: pkg-storage
            pkgs: ./pkg/storage/...
          # Heavy integration tests (Firestore-backed processor + prototest harness).
          - name: pkg-processor
            pkgs: ./pkg/processor/... ./pkg/prototest/...
    services: {}   # No sidecar needed — gcloud is in the dev container.
    steps:
      - uses: actions/checkout@v4

      - name: Start Firestore emulator
        run: |
          gcloud emulators firestore start \
            --host-port=0.0.0.0:8086 \
            --project=test-project &
          for _ in $(seq 1 30); do
            curl -sf http://localhost:8086/ && break
            sleep 2
          done

      - name: Generate proto stubs (from BSR)
        run: buf generate

      - name: Test (${{ matrix.group.name }})
        # -p 4:        run up to 4 packages concurrently (matches 4-vCPU runner)
        # -parallel 4: run up to 4 t.Parallel() funcs concurrently within a package
        run: go test ${{ matrix.group.pkgs }} -v -race -count=1 -p 4 -parallel 4 -coverprofile=coverage-${{ matrix.group.name }}.out -timeout 180s

      - name: Upload coverage (${{ matrix.group.name }})
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.group.name }}
          path: coverage-${{ matrix.group.name }}.out
          retention-days: 1

  # ── merge coverage and run govulncheck ──────────────────────────────────────
  build-and-test:
    needs: [go-test]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/candelahq/candela-dev:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true

      - name: Merge coverage profiles
        run: |
          files=(coverage-*.out)
          head -1 "${files[0]}" > coverage.out
          for f in "${files[@]}"; do
            tail -n +2 "$f" >> coverage.out
          done

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: govulncheck
        continue-on-error: true   # Advisory — don't block CI on stdlib CVEs we can't patch immediately
        run: govulncheck ./...

  # ── UI build + lint ─────────────────────────────────────────────────────────
  ui-build-and-lint:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/candelahq/candela-dev:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pnpm install
        working-directory: ui

      - name: Generate TS proto stubs (from BSR)
        run: buf generate

      - name: Lint
        run: pnpm run lint
        working-directory: ui

      - name: Build
        run: pnpm run build
        working-directory: ui

  # ── UI E2E ──────────────────────────────────────────────────────────────────
  ui-e2e:
    runs-on: ubuntu-latest
    needs: [ui-build-and-lint]
    container:
      image: ghcr.io/candelahq/candela-dev:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pnpm install
        working-directory: ui

      - name: Generate TS proto stubs (from BSR)
        run: buf generate

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: ui

      - name: Run Playwright tests
        run: pnpm exec playwright test
        working-directory: ui
        env:
          CI: true

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui/playwright-report/
          retention-days: 7

  # ── Rust check ──────────────────────────────────────────────────────────────
  rust-check:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/candelahq/candela-dev:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate Rust proto stubs (from BSR)
        run: cd rust && buf generate

      - name: Format check
        run: cd rust && cargo fmt --check

      - name: Clippy
        run: cd rust && cargo clippy --workspace -- -D warnings

      - name: Test
        run: cd rust && cargo test --workspace

      - name: License & vulnerability audit
        continue-on-error: true  # Advisory until deny.toml is configured
        run: cd rust && cargo deny check
