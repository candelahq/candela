# Candela — Continuous Deployment
#
# Triggers after CI completes successfully on main.
# Builds the container via Cloud Build, then deploys to Cloud Run.
#
# Auth: Workload Identity Federation (keyless) — see terraform/github_wif.tf
#
# Required GitHub Secrets:
#   GCP_PROJECT_ID              — GCP project ID
#   GCP_REGION                  — Cloud Run region (e.g., us-central1)
#   GCP_WIF_PROVIDER            — WIF provider resource name
#   GCP_WIF_SERVICE_ACCOUNT     — Service account email for deployments
#   FIREBASE_API_KEY            — Firebase Web API key
#   FIREBASE_AUTH_DOMAIN        — e.g., project.firebaseapp.com
#   FIREBASE_PROJECT_ID         — Firebase project ID
#   FIREBASE_APP_ID             — Firebase app ID

name: Deploy

on:
  # Trigger after CI workflow completes successfully on main.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

  # Manual trigger for ad-hoc deploys (skips CI gate).
  workflow_dispatch:

# Cancel in-flight deploys when a new commit lands on main.
concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write         # Required for Workload Identity Federation

env:
  IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/candela/candela-server

jobs:
  # ── Build container image via Cloud Build ──
  build:
    runs-on: ubuntu-latest
    # Only run if CI succeeded (or if manually triggered).
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate proto stubs (from BSR)
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
        run: nix develop -c buf generate

      - name: Compute image tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
          else
            SHA="${GITHUB_SHA}"
          fi
          echo "tag=${SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Submit Cloud Build (async)
        id: build
        run: |
          BUILD_OUTPUT=$(gcloud builds submit \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --config cloudbuild.yaml \
            --async \
            --substitutions="\
          _FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }},\
          _FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }},\
          _FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }},\
          _FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }},\
          _IMAGE_TAG=${{ steps.meta.outputs.tag }}" \
            --timeout=1200s 2>&1)
          echo "$BUILD_OUTPUT"
          BUILD_ID=$(echo "$BUILD_OUTPUT" | grep -oP 'builds/\K[a-f0-9-]+' | head -1)
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "🕯️ Cloud Build submitted: $BUILD_ID"

      - name: Wait for Cloud Build
        run: |
          echo "⏳ Waiting for build ${{ steps.build.outputs.build_id }}..."
          while true; do
            STATUS=$(gcloud builds describe "${{ steps.build.outputs.build_id }}" \
              --project "${{ secrets.GCP_PROJECT_ID }}" \
              --format='value(status)' 2>/dev/null)
            case "$STATUS" in
              SUCCESS)
                echo "✅ Build succeeded"
                break
                ;;
              FAILURE|TIMEOUT|CANCELLED|INTERNAL_ERROR)
                echo "❌ Build failed with status: $STATUS"
                exit 1
                ;;
              *)
                echo "  status: $STATUS"
                sleep 15
                ;;
            esac
          done

  # ── Deploy to Cloud Run ──
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production       # GitHub Environment for optional deploy protection rules

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update candela \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ secrets.GCP_REGION }}" \
            --image "${{ env.IMAGE }}:${{ needs.build.outputs.image_tag }}"

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe candela \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ secrets.GCP_REGION }}" \
            --format='value(status.url)')
          echo "🕯️ Deployed to: $URL"
          # Health check (with auth token for IAM-protected services)
          TOKEN=$(gcloud auth print-identity-token --audiences="$URL" 2>/dev/null || echo "")
          if [ -n "$TOKEN" ]; then
            curl -sf -H "Authorization: Bearer $TOKEN" "$URL/healthz" || echo "⚠️ Health check failed (may need IAM access)"
          else
            echo "ℹ️ Skipping health check (no identity token available)"
          fi
