name: Dev Container

on:
  push:
    branches: [main]
    paths:
      - Dockerfile.ci
      - flake.nix
      - flake.lock
  # Allow manual trigger to rebuild the image on demand.
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # needed to push to GHCR

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          push: true
          tags: ghcr.io/candelahq/candela-dev:latest
          # Cache layers between builds — only the flake layer is invalidated
          # when flake.nix / flake.lock changes.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - run: echo "✅ Pushed ghcr.io/candelahq/candela-dev:latest"
