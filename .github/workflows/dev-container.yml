name: Dev Container

on:
  push:
    branches: [main]
    paths:
      - flake.nix
      - flake.lock
  # Allow manual trigger to rebuild the image on demand.
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # needed to push to GHCR

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build dev container image
        run: nix build .#devContainer --out-link result

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load and push image
        run: |
          docker load < result
          docker tag candela-dev:latest ghcr.io/candelahq/candela-dev:latest
          docker push ghcr.io/candelahq/candela-dev:latest
          echo "✅ Pushed ghcr.io/candelahq/candela-dev:latest"
