name: Proxy Release (Rust)

on:
  push:
    tags:
      - 'proxy-v*'

permissions:
  contents: write    # Create GitHub releases and upload assets
  packages: write    # Push container images to GHCR

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/candela-proxy

jobs:
  # ── Cross-compile native binaries ──
  build-binaries:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: candela-proxy-linux-amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: candela-proxy-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: candela-proxy-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: candela-proxy-darwin-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools

      - name: Install musl tools (Linux AMD64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        working-directory: rust
        run: cargo build --release --bin candela-proxy --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp rust/target/${{ matrix.target }}/release/candela-proxy dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  # ── Build and push multi-arch container image ──
  build-container:
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#proxy-}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.proxy
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub release with binaries and checksums ──
  release:
    runs-on: ubuntu-latest
    needs: [build-binaries, build-container]
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#proxy-}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum candela-proxy-* > checksums.txt

      - name: Create archives
        working-directory: dist
        run: |
          for binary in candela-proxy-*; do
            [[ "$binary" == "checksums.txt" ]] && continue
            tar czf "${binary}.tar.gz" "$binary"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "candela-proxy ${{ steps.version.outputs.version }}"
          body: |
            ## candela-proxy ${{ steps.version.outputs.version }}

            Standalone LLM observability proxy.

            ### Container Image
            ```
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ```

            ### Quick Start
            ```bash
            # Download and run
            candela-proxy  # starts on :8080

            # Or with Docker
            docker run -p 8080:8080 \
              -e PROVIDERS=openai,anthropic \
              -e CANDELA_PROJECT_ID=my-project \
              ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ```
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          draft: false
          prerelease: false
