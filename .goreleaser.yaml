# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: candela

before:
  hooks:
    # Generate proto stubs needed by the build.
    - buf generate

builds:
  - id: candela
    main: ./cmd/candela
    binary: candela
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

# Create macOS universal binaries (fat binaries: arm64 + amd64).
universal_binaries:
  - id: candela-universal
    ids:
      - candela
    replace: true
    name_template: candela

archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "all" }}universal
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^style:"

brews:
  - repository:
      owner: candelahq
      name: homebrew-tap
      # Fine-grained PAT with contents:write on candelahq/homebrew-tap.
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    name: candela
    homepage: "https://github.com/candelahq/candela"
    description: "Local LLM observability proxy — traces, costs, and budgets for AI-powered dev tools"
    license: "Apache-2.0"
    skip_upload: auto   # Skip on pre-releases
    install: |
      bin.install "candela"
    test: |
      system "#{bin}/candela", "version"
    # Homebrew services integration — enables `brew services start candela`.
    service: |
      run [opt_bin/"candela", "run"]
      keep_alive true
      log_path var/"log/candela.log"
      error_log_path var/"log/candela.log"
    # Post-install caveats shown to the user.
    caveats: |
      To get started, create a config file:

        mkdir -p ~/.config/candela
        cat > ~/.config/candela/config.yaml <<EOF
        port: 8181
        providers:
          - name: google
            models: ["gemini-2.5-pro", "gemini-2.5-flash", "gemini-3.5-flash"]
          - name: anthropic
            models: ["claude-sonnet-4-20250514"]
        vertex_ai:
          project: YOUR_GCP_PROJECT
          region: us-central1
        EOF

      Authenticate (no gcloud required):
        candela auth login             # GCP OAuth2 (default)
        candela auth login --provider aws  # AWS SSO/access keys

      Then run:
        candela start          # background daemon
        candela status         # check running state
        candela run            # foreground (debug)

      Management UI: http://127.0.0.1:8181/_local/

      Or as a login service:
        brew services start candela
