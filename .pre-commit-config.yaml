repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.1.5
    hooks:
      - id: golangci-lint
        args: ["--timeout=5m"]

  - repo: local
    hooks:
      - id: buf-lint
        name: buf lint
        entry: buf lint proto
        language: system
        pass_filenames: false
        files: '\.proto$'

      - id: buf-format
        name: buf format
        entry: buf format -w proto
        language: system
        pass_filenames: false
        files: '\.proto$'

      - id: buf-breaking
        name: buf breaking
        entry: buf breaking proto --against '.git#branch=main,subdir=proto'
        language: system
        pass_filenames: false
        files: '\.proto$'

      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        pass_filenames: false
        files: '\.go$'

      - id: go-mod-tidy
        name: go mod tidy
        entry: go mod tidy
        language: system
        pass_filenames: false
        files: '\.go$|go\.mod$|go\.sum$'

      - id: gofmt
        name: gofmt
        entry: bash -c 'test -z "$(gofmt -l .)"'
        language: system
        pass_filenames: false
        files: '\.go$'

      - id: go-test
        name: go test
        entry: go test ./... -count=1 -timeout 30s
        language: system
        pass_filenames: false
        files: '\.go$'

      - id: playwright-e2e
        name: playwright e2e
        entry: bash -c 'cd ui && npx playwright test'
        language: system
        pass_filenames: false
        files: '^ui/'
