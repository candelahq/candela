# Candela OTel Collector Builder Configuration
#
# Build with:
#   go install go.opentelemetry.io/collector/cmd/builder@latest
#   builder --config=builder.yaml
#
# This produces a custom collector binary with the GenAI processor baked in.

dist:
  name: candela-collector
  description: Candela custom OpenTelemetry Collector with GenAI processor
  output_path: ../cmd/candela-collector
  otelcol_version: "0.117.0"

receivers:
  - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.117.0

processors:
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.117.0
  # Custom GenAI processor (local)
  - gomod: github.com/candelahq/candela/collector/processors/genaiprocessor v0.0.0
    path: ./processors/genaiprocessor

exporters:
  - gomod: go.opentelemetry.io/collector/exporter/otlpexporter v0.117.0
  - gomod: go.opentelemetry.io/collector/exporter/otlphttpexporter v0.117.0
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.117.0

extensions:
  - gomod: go.opentelemetry.io/collector/extension/zpagesextension v0.117.0
