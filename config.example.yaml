# Candela Configuration (Example)
# Copy to config.yaml and adjust for your environment.

server:
  host: "0.0.0.0"
  port: 8181

storage:
  backend: "duckdb"  # Options: duckdb (default), sqlite, bigquery
  duckdb:
    path: "candela.duckdb"  # DuckDB file path (OLAP, high-performance)
  sqlite:
    path: "candela.db"  # Use ":memory:" for ephemeral
  # bigquery:
  #   project_id: "my-gcp-project"
  #   dataset: "candela"
  #   location: "US"

proxy:
  enabled: true
  project_id: "default"

  # Vertex AI configuration (required for Anthropic proxy).
  # Set your GCP project and region. Auth is automatic via ADC
  # (run: gcloud auth application-default login).
  vertex_ai:
    project_id: "your-gcp-project-id"
    region: "us-east5"      # Vertex AI region (Claude available here)

  # Specify which providers to enable. If omitted, all providers are enabled.
  # Valid values: openai, google, anthropic, gemini-oai
  #
  # Routes registered (only for enabled providers):
  #   /proxy/openai/      → https://api.openai.com
  #   /proxy/google/      → https://generativelanguage.googleapis.com
  #   /proxy/gemini-oai/  → https://generativelanguage.googleapis.com/v1beta/openai (OpenAI-compat)
  #   /proxy/anthropic/   → Vertex AI (with format translation + ADC auth)
  #
  # Editor integration (Zed, OpenCode, etc.):
  #   OpenAI:     Base URL = http://localhost:8181/proxy/openai/v1
  #   Gemini:     Base URL = http://localhost:8181/proxy/gemini-oai/v1
  #   Anthropic:  Base URL = http://localhost:8181/proxy/anthropic/v1
  #
  # Local models (Ollama/vLLM/LM Studio) are handled by candela-local.
  # See ~/.candela.yaml for local runtime configuration.
  providers:
    - openai
    - google
    - anthropic
    - gemini-oai

  # LM Studio compatibility mode.
  # Serves /v1/chat/completions and /v1/models at the root path (no /proxy/ prefix).
  # Model names in requests are routed to the matching upstream provider.
  # Also starts a secondary listener on the LM Studio default port (1234)
  # so IntelliJ/tools can simply "Enable LM Studio" with no URL changes.
  lmstudio:
    enabled: true
    port: 1234              # Secondary listener port (default: 1234, LM Studio's default)
    models:
      - id: gpt-4o
        provider: openai
      - id: gpt-4o-mini
        provider: openai
      - id: o3-mini
        provider: openai
      - id: claude-sonnet-4-20250514
        provider: anthropic
      - id: claude-opus-4-20250514
        provider: anthropic
      - id: gemini-2.5-pro
        provider: gemini-oai
      - id: gemini-2.5-flash
        provider: gemini-oai
      # Local models (requires a running Ollama/vLLM/LM Studio)
      # - id: llama3.2:8b
      #   provider: local
      # - id: codellama:13b
      #   provider: local

# Pricing overrides.
# Built-in defaults cover all cloud models at list prices.
# Use this section for negotiated rates or enterprise discounts.
pricing:
  # Global discount applied to ALL model pricing (0.0 = none, 0.15 = 15% off).
  discount_percent: 0.0

  # Per-model overrides. These take priority over built-in defaults.
  # Uncomment and adjust for negotiated enterprise rates:
  # models:
  #   - provider: openai
  #     model: gpt-4o
  #     input_per_million: 2.00     # negotiated rate (list: $2.50)
  #     output_per_million: 8.00    # negotiated rate (list: $10.00)
  #   - provider: google
  #     model: gemini-2.5-pro
  #     input_per_million: 1.00
  #     output_per_million: 8.00
  #     discount_percent: 0.10      # additional 10% off this model

cors:
  # Origins allowed to make cross-origin requests.
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:8181"

worker:
  batch_size: 100
  flush_interval: "2s"
