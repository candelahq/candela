# Candela Configuration
# Copy to config.yaml and adjust for your environment.

server:
  host: "0.0.0.0"
  port: 8181

storage:
  backend: "duckdb"  # Options: duckdb (default), sqlite, bigquery
  duckdb:
    path: "candela.duckdb"  # DuckDB file path (OLAP, high-performance)
  sqlite:
    path: "candela.db"  # Use ":memory:" for ephemeral
  # bigquery:
  #   project_id: "my-gcp-project"
  #   dataset: "candela"
  #   location: "US"

proxy:
  enabled: true
  project_id: "default"

  # Vertex AI configuration (required for Anthropic proxy).
  # Set your GCP project and region. Auth is automatic via ADC
  # (run: gcloud auth application-default login).
  vertex_ai:
    project_id: "austin-azra-sandbox-project"  # Your GCP project ID
    region: "us-east5"      # Vertex AI region (Claude available here)

  # Specify which providers to enable. If omitted, all providers are enabled.
  # Valid values: openai, google, anthropic, gemini-oai
  #
  # Routes registered (only for enabled providers):
  #   /proxy/openai/      → https://api.openai.com
  #   /proxy/google/      → https://generativelanguage.googleapis.com
  #   /proxy/gemini-oai/  → https://generativelanguage.googleapis.com/v1beta/openai (OpenAI-compat)
  #   /proxy/anthropic/   → Vertex AI (with format translation + ADC auth)
  #
  # Editor integration (Zed, OpenCode, etc.):
  #   OpenAI:     Base URL = http://localhost:8181/proxy/openai/v1
  #   Gemini:     Base URL = http://localhost:8181/proxy/gemini-oai/v1
  #   Anthropic:  Base URL = http://localhost:8181/proxy/anthropic/v1
  providers:
    - openai
    - google
    - anthropic
    - gemini-oai

cors:
  # Origins allowed to make cross-origin requests.
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"

worker:
  batch_size: 100
  flush_interval: "2s"
