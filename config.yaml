# Candela Configuration
# Copy to config.yaml and adjust for your environment.
# If no config file is found, defaults to SQLite on port 8080.

server:
  host: "0.0.0.0"
  port: 8080

storage:
  backend: "sqlite"  # Options: sqlite (default), bigquery
  sqlite:
    path: "candela.db"  # Use ":memory:" for ephemeral
  # bigquery:
  #   project_id: "my-gcp-project"
  #   dataset: "candela"
  #   location: "US"

proxy:
  enabled: true
  project_id: "default"
  # Specify which providers to enable. If omitted, all providers are enabled.
  # Valid values: openai, google, anthropic
  providers:
    - openai
    - google
    - anthropic
  # Routes registered (only for enabled providers):
  #   /proxy/openai/    → https://api.openai.com
  #   /proxy/google/    → https://generativelanguage.googleapis.com
  #   /proxy/anthropic/ → Vertex AI (us-central1)
  #
  # Usage:
  #   client = OpenAI(base_url="http://localhost:8080/proxy/openai/v1")

worker:
  batch_size: 100
  flush_interval: "2s"
