pre-commit:
  parallel: true
  commands:
    trailing-whitespace:
      glob: "*.{go,rs,toml,yaml,yml,json,md,proto}"
      run: "grep -rn '[[:blank:]]$' {staged_files} && exit 1 || exit 0"
    check-yaml:
      glob: "*.{yaml,yml}"
      run: "for f in {staged_files}; do yq '.' \"$f\" > /dev/null || exit 1; done"
    detect-private-key:
      glob: "*"
      exclude: "lefthook.yml"
      run: "grep -rn -- '-----BEGIN.*KEY-----' {staged_files} && exit 1 || exit 0"
    check-merge-conflict:
      glob: "*"
      run: "grep -rn '^<<<<<<< ' {staged_files} && exit 1 || exit 0"
    check-json:
      glob: "*.json"
      run: "for f in {staged_files}; do python3 -m json.tool \"$f\" > /dev/null || exit 1; done"
    end-of-file-fixer:
      glob: "*.{go,rs,toml,yaml,yml,json,md,proto}"
      run: |
        fail=0
        for f in {staged_files}; do
          if [ -s "$f" ] && [ "$(tail -c1 "$f" | xxd -p)" != "0a" ]; then
            echo "No newline at end of: $f"
            fail=1
          fi
        done
        exit $fail
    golangci-lint:
      glob: "*.go"
      run: golangci-lint run --timeout=5m
    go-vet:
      glob: "*.go"
      run: go vet ./...
    go-mod-tidy:
      glob: "*.go"
      run: go mod tidy -diff
    gofmt:
      glob: "*.go"
      run: "gofmt -l {staged_files} | grep . && exit 1 || exit 0"
    go-test:
      glob: "*.go"
      run: go test ./... -count=1 -timeout 30s
    # ── Rust ──
    cargo-fmt:
      glob: "*.rs"
      run: cd rust && cargo fmt --check
    cargo-clippy:
      glob: "*.{rs,toml}"
      run: cd rust && cargo clippy --workspace -- -D warnings
    cargo-test:
      glob: "*.rs"
      run: cd rust && cargo test --workspace --quiet
