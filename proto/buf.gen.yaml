version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/candelahq/candela/gen/go
plugins:
  # Go protobuf
  - remote: buf.build/protocolbuffers/go
    out: ../gen/go
    opt: paths=source_relative
  # Go ConnectRPC
  - remote: buf.build/connectrpc/go
    out: ../gen/go
    opt: paths=source_relative
  # TypeScript (ES) protobuf v2 — local plugin from ui/node_modules
  # connect-es v2 derives service clients from protobuf schema
  - local: ../ui/node_modules/.bin/protoc-gen-es
    out: ../gen/ts
    opt: target=ts
