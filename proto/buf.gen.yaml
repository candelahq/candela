version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/candelahq/candela/gen/go
plugins:
  # Go protobuf
  - remote: buf.build/protocolbuffers/go
    out: ../gen/go
    opt: paths=source_relative
  # Go ConnectRPC
  - remote: buf.build/connectrpc/go
    out: ../gen/go
    opt: paths=source_relative
  # TypeScript (ES) — Remote Generation
  - remote: buf.build/connectrpc/es
    out: ../gen/ts
    opt: target=ts
  # BigQuery schema generation from proto (local plugin)
  # Install: go install github.com/GoogleCloudPlatform/protoc-gen-bq-schema/v3@latest
  - local: protoc-gen-bq-schema
    out: ../gen/bq
